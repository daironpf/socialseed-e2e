general:
  environment: dev
  timeout: 30000
  user_agent: socialseed-e2e/1.0
  verbose: true
services:
  demo-api:
    base_url: http://localhost:5000
    health_endpoint: /health
    timeout: 5000
    auto_start: false
    required: true
  grpc-demo:
    base_url: localhost:50051
    protocol: grpc
    timeout: 5000
    auto_start: false
    required: false
    health_endpoint: /actuator/health
  websocket-demo:
    base_url: ws://localhost:50052
    health_endpoint: /health
    timeout: 5000
    auto_start: false
    required: false
  auth-demo:
    base_url: http://localhost:5003
    health_endpoint: /health
    timeout: 5000
    auto_start: false
    required: false
_e2e_version: 1.0.0
reporting:
  format: console
  save_logs: true
  log_dir: ./logs
parallel:
  enabled: false
  max_workers: null
  mode: service
security:
  verify_ssl: true
settings:
  verification_level: strict
  project_version: 1.0.0
